kind = "web"
previewPath = "/"
title = "Interpayer"
version = "1.0.0"
id = "artifacts/interpayer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22639

[services.development]
run = "pnpm --filter @workspace/interpayer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/interpayer", "run", "build" ]
publicDir = "artifacts/interpayer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22639"
BASE_PATH = "/"
